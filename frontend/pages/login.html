<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Nobre Elegancy Noivas</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body {
      background: #1a0d12;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', sans-serif;
    }
    .login-wrap {
      width: 100%; max-width: 400px; padding: 1rem;
    }
    .login-card {
      background: #230f16;
      border: 1px solid #4a1e28;
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,132,142,0.1);
    }
    .login-logo {
      text-align: center; margin-bottom: 2rem;
    }
    .logo-symbol {
      font-size: 2.5rem; color: #C9848E;
      display: block; margin-bottom: .5rem;
    }
    .logo-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem; font-weight: 700;
      color: #E8B4BA; letter-spacing: 0.05em;
    }
    .logo-title span { color: #C9848E; }
    .logo-sub {
      font-size: 0.7rem; color: #7a5560;
      text-transform: uppercase; letter-spacing: 0.15em;
      margin-top: 0.25rem;
    }
    .logo-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, #C9848E, transparent);
      margin: 1rem auto; width: 60%;
    }
    .form-control {
      background: #2a1218; border: 1px solid #4a1e28;
      color: #f0e6e8; font-size: 0.85rem; padding: .7rem 1rem;
      border-radius: 8px;
    }
    .form-control:focus {
      background: #2a1218; color: #f0e6e8;
      border-color: #C9848E;
      box-shadow: 0 0 0 .15rem rgba(201,132,142,.2);
    }
    .form-control::placeholder { color: #7a5560; }
    .form-label { color: #b08890; font-size: .75rem; font-weight: 500; }
    .btn-login {
      background: linear-gradient(135deg, #C9848E, #A0535E);
      color: #fff; border: none; width: 100%;
      padding: .75rem; border-radius: 8px;
      font-weight: 600; font-size: .9rem;
      letter-spacing: 0.03em;
      transition: all .2s;
    }
    .btn-login:hover {
      background: linear-gradient(135deg, #A0535E, #7d3540);
      color: #fff; transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(201,132,142,.3);
    }
    .alert-danger {
      background: rgba(248,113,113,.1);
      border-color: rgba(248,113,113,.3);
      color: #f87171; font-size: .82rem;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <span class="logo-symbol">✦</span>
        <div class="logo-title">NOBRE <span>ELEGANCY</span></div>
        <div class="logo-sub">Vestidos de Noiva</div>
        <div class="logo-line"></div>
      </div>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }} mb-3">{{ msg }}</div>
        {% endfor %}
      {% endwith %}
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Usuário</label>
          <input type="text" name="email" class="form-control" placeholder="Ex: Isaac" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label">Senha</label>
          <input type="password" name="senha" class="form-control" placeholder="Sua senha" required>
        </div>
        <button type="submit" class="btn btn-login">Entrar</button>
      </form>
    </div>
  </div>
</body>
</html>
