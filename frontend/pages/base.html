<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Nobre Elegancy Noivas{% endblock %}</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --rose:       #C9848E;
      --rose-dark:  #A0535E;
      --rose-light: #E8B4BA;
      --rose-glow:  rgba(201,132,142,0.18);
      --gold:       #C9A96E;
      --bg:         #1a0d12;
      --bg2:        #230f16;
      --card:       #2a1218;
      --card2:      #331520;
      --border:     #4a1e28;
      --border2:    rgba(201,132,142,0.25);
      --text:       #f0e6e8;
      --text-sec:   #b08890;
      --text-dim:   #7a5560;
      --green:      #4ade80;
      --red:        #f87171;
      --sidebar-w:  220px;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 14px;
    }
    .sidebar {
      position: fixed; top: 0; left: 0;
      width: var(--sidebar-w); height: 100vh;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 100; overflow-y: auto;
    }
    .sidebar-brand {
      padding: 1.25rem 1rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem; font-weight: 700;
      color: var(--rose-light); line-height: 1.1;
      letter-spacing: 0.03em;
    }
    .brand-name span { color: var(--rose); }
    .brand-sub {
      font-size: 0.65rem; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-top: 0.2rem;
    }
    .brand-line {
      height: 2px; background: linear-gradient(90deg, var(--rose), transparent);
      margin-top: 0.6rem; border-radius: 1px;
    }
    .sidebar-nav { padding: 0.5rem 0; flex: 1; }
    .nav-section {
      padding: 0.75rem 1rem 0.2rem;
      font-size: 0.6rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--text-dim);
    }
    .sidebar-link {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.5rem 1rem; color: var(--text-sec);
      text-decoration: none; font-size: 0.82rem;
      border-left: 2px solid transparent;
      transition: all 0.15s;
    }
    .sidebar-link:hover {
      background: var(--rose-glow);
      color: var(--rose-light);
      border-left-color: var(--rose-dark);
    }
    .sidebar-link.active {
      background: var(--rose-glow);
      color: var(--rose-light);
      border-left-color: var(--rose);
      font-weight: 500;
    }
    .sidebar-link i { font-size: 0.95rem; width: 18px; }
    .sidebar-footer {
      padding: 0.75rem 0;
      border-top: 1px solid var(--border);
    }
    .main-content { margin-left: var(--sidebar-w); min-height: 100vh; }
    .topbar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
